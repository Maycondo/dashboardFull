<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Dashboard</h1>
  </header>

  <div class="container">

    <aside>
      <a href="#">Home</a>
      <a href="#">Usuários</a>
      <a href="#">Relatórios</a>
      <a href="#">Configurações</a>
    </aside>

    <main>

      <div class="cards">

        <article class="card">
          <h2>Usuários</h2>
          <p>1.250</p>
        </article>

        <article class="card">
          <h2>Vendas</h2>
          <p>R$ 8.500</p>
        </article>

        <article class="card">
          <h2>Pedidos</h2>
          <p>320</p>
        </article>

      </div>

      <section>
        <h2>Últimos Pedidos</h2>

        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Produto</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>João</td>
              <td>Notebook</td>
              <td>Enviado</td>
            </tr>

            <tr>
              <td>Maria</td>
              <td>Mouse</td>
              <td>Pendente</td>
            </tr>
          </tbody>
        </table>

      </section>

    </main>

  </div>

</body>
</html>
